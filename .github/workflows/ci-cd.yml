name: CI/CD

on:
  push:
    branches: [incident_intelligence_prj_pipeline_s3]
    tags: ['v*']
  pull_request:
    branches: [incident_intelligence_prj_pipeline_s3]

permissions:
  contents: read
  id-token: write
  packages: write

env:
  PYTHON_VERSION: '3.11'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Run tests
        run: |
          pytest -q

  build-and-push:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/incident_intelligence_prj_pipeline_s3'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy-aws:
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/incident_intelligence_prj_pipeline_s3'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Print ECR values
        run: |
          echo "Registry: ${{ steps.login-ecr.outputs.registry }}"
          echo "Repository: ${{ secrets.AWS_ECR_REPOSITORY }}"
          echo "Region: ${{ secrets.AWS_REGION }}"

      - name: Build and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/${{ secrets.AWS_ECR_REPOSITORY }}:$IMAGE_TAG .
          docker push $ECR_REGISTRY/${{ secrets.AWS_ECR_REPOSITORY }}:$IMAGE_TAG
          docker tag $ECR_REGISTRY/${{ secrets.AWS_ECR_REPOSITORY }}:$IMAGE_TAG $ECR_REGISTRY/${{ secrets.AWS_ECR_REPOSITORY }}:latest
          docker push $ECR_REGISTRY/${{ secrets.AWS_ECR_REPOSITORY }}:latest

      - name: Render ECS task definition
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.AWS_ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
          EXECUTION_ROLE_ARN: ${{ secrets.AWS_ECS_EXECUTION_ROLE_ARN }}
          TASK_ROLE_ARN: ${{ secrets.AWS_ECS_TASK_ROLE_ARN }}
          SECRET_ARN: ${{ secrets.AWS_ECS_SECRET_ARN }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          template_path = Path('infra/ecs-task-definition.json')
          rendered_path = Path('infra/ecs-task-definition.rendered.json')
          data = json.loads(template_path.read_text(encoding='utf-8'))

          image = f"{os.environ['ECR_REGISTRY']}/{os.environ['ECR_REPOSITORY']}:{os.environ['IMAGE_TAG']}"
          data['executionRoleArn'] = os.environ.get('EXECUTION_ROLE_ARN') or data['executionRoleArn']
          data['taskRoleArn'] = os.environ.get('TASK_ROLE_ARN') or data['taskRoleArn']
          data['containerDefinitions'][0]['image'] = image
          data['containerDefinitions'][0]['logConfiguration']['options']['awslogs-region'] = os.environ['AWS_REGION']

          if os.environ.get('SECRET_ARN'):
              data['containerDefinitions'][0]['secrets'] = [{
                  'name': 'OPENAI_API_KEY',
                  'valueFrom': os.environ['SECRET_ARN']
              }]
          else:
              data['containerDefinitions'][0].pop('secrets', None)

          rendered_path.write_text(json.dumps(data, indent=2), encoding='utf-8')
          print(f'Rendered ECS task definition to {rendered_path}')
          PY

      - name: Register ECS task definition
        env:
          CLUSTER_NAME: ${{ secrets.AWS_ECS_CLUSTER }}
          SERVICE_NAME: ${{ secrets.AWS_ECS_SERVICE }}
        run: |
          aws ecs describe-services --cluster "$CLUSTER_NAME" --services "$SERVICE_NAME" > /dev/null
          task_def_arn=$(aws ecs register-task-definition --cli-input-json file://infra/ecs-task-definition.rendered.json --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "TASK_DEFINITION_ARN=$task_def_arn" >> "$GITHUB_ENV"

      - name: Update ECS service
        env:
          CLUSTER_NAME: ${{ secrets.AWS_ECS_CLUSTER }}
          SERVICE_NAME: ${{ secrets.AWS_ECS_SERVICE }}
        run: |
          aws ecs update-service --cluster "$CLUSTER_NAME" --service "$SERVICE_NAME" --task-definition "$TASK_DEFINITION_ARN" --force-new-deployment > /dev/null

      - name: Wait for deployment
        env:
          CLUSTER_NAME: ${{ secrets.AWS_ECS_CLUSTER }}
          SERVICE_NAME: ${{ secrets.AWS_ECS_SERVICE }}
        run: |
          aws ecs wait services-stable --cluster "$CLUSTER_NAME" --services "$SERVICE_NAME"
